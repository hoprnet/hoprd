---
blokli_url: https://blokli.prod.hoprnet.link
identity:
  file: "/app/hoprd/conf/hopr.id"
db:
  data: /app/hoprd/data
api:
  enable: true
  host:
    address:
      IPv4: 0.0.0.0
    port: 3001
strategy:
  allow_recursive: false
  strategies:
    - AutoRedeeming:
        redeem_all_on_close: true
        minimum_redeem_ticket_value: "1 wxHOPR"
        redeem_on_winning: true
    - ChannelLifecycle:
        population:
          min_open_channels: 5
          target_open_channels: 8
        eligibility:
          require_currently_connected: true
          min_peer_quality_score: 0.5
          peer_quality_weight: 0.6
          ticket_activity_weight: 0.4
          require_observed_since_start: true
          allowlist: ~
          blocklist: []
        funding:
          initial_balance: "1 wxHOPR"
          topup_balance: "1 wxHOPR"
          lower_balance_threshold: "1 wxHOPR"
          min_safe_balance_required: "1 wxHOPR"
          stop_when_unfunded: true
        proactive_funding:
          enabled: true
          safety_margin: 1.5
          balance_drain_weight: 1.0
          ticket_index_drain_weight: 1.0
        closure:
          close_below_quality_score: 0.3
          close_when_drained_below: "0 wxHOPR"
          close_max_concurrent: 2
        finalizer:
          enabled: true
          finalize_max_concurrent: 4
        restart: {}
        concurrency:
          max_concurrent_actions: 4
        selector: Default
hopr:
  network:
    probe_interval: "3s"
    probe_recheck_threshold: "10s"
  host:
    address:
      IPv4: 127.0.0.1 # NOTE: adapt this to reflect your public IP
    port: 9091 # NOTE: adapt this to reflect your public PORT - the value set in HOPRD_P2P_PORT
  safe_module:
    safe_address: "0x0000000000000000000000000000000000000000" # NOTE: fill in value
    module_address: "0x0000000000000000000000000000000000000000" # NOTE: fill in value
