toolchain:
  - changed-files:
      - any-glob-to-any-file:
          - "flake.lock"
          - "flake.nix"
          - ".github/**"
          - "rust-toolchain.toml"
          - "rust-toolchain-nightly.toml"
dependencies:
  - changed-files:
      - any-glob-to-any-file:
          - "Cargo.lock"
          - "**/Cargo.toml"
documentation:
  - changed-files:
      - any-glob-to-any-file:
          - "*.md"
crate:hoprd:
  - changed-files:
      - any-glob-to-any-file: hoprd/**
crate:hoprd-api:
  - changed-files:
      - any-glob-to-any-file: rest-api/**
crate:hoprd-api-client:
  - changed-files:
      - any-glob-to-any-file: rest-api-client/**
crate:hoprd-localcluster:
  - changed-files:
      - any-glob-to-any-file: localcluster/**
