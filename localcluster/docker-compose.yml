---
# Build the localcluster image first:
#   docker load < $(nix build -L .#docker-hoprd-localcluster-x86_64-linux --print-out-paths)
# Then:
#   docker compose -f localcluster/docker-compose.yml up -d
services:
  chain:
    container_name: hoprd-blokli-anvil
    platform: linux/amd64
    image: europe-west3-docker.pkg.dev/hoprassociation/docker-images/bloklid-anvil:0.10.3-pr.339
    ports:
      - "8080:8080"
  cluster:
    container_name: hoprd-localcluster
    platform: linux/amd64
    image: hoprd-localcluster:latest
    depends_on:
      - chain
    environment:
      HOPRD_CHAIN_URL: http://chain:8080
      RUST_LOG: debug
    command:
      - --hoprd-bin
      - /bin/hoprd
      - --api-host
      - "0.0.0.0"
      - --api-port-base
      - "3001"
      - --p2p-port-base
      - "9001"
      - --size
      - "${CLUSTER_SIZE:-3}"
    ports:
      # API ports for all possible nodes (1–5); only active nodes respond.
      - "3001-3005:3001-3005"
